openapi: 3.1.0
x-stoplight:
  id: 2p76lk7uckivl
info:
  title: Metrics API
  version: '1.1'
  description: 'The Metrics API is a REST API allowing historic metrics calculations based on Event activity that happened at defined Curb places. Metrics data should be viewed as representative sample data, not necessarily a 100% accurate picture of what happens at every defined curb space, and agencies may update the data monthly or more frequently depending on their implementation. Defines common calculation methodologies to measure historic dwell time, occupancy, usage and other aggregated statistics.'
  contact:
    name: Open Mobility Foundation
    url: 'https://www.openmobilityfoundation.org'
    email: membership@openmobilityfoundation.org
  license:
    name: Creative Commons Attribution 4.0 International Public License
    url: 'https://creativecommons.org/licenses/by/4.0/'
tags:
  - name: aggregates
    description: Query aggregated curb metrics.
  - name: sessions
    description: Query curb metric sessions.
servers:
  - url: 'http://localhost:3000'
paths:
  /metrics/sessions:
    get:
      summary: Get Metric Sessions
      tags:
        - sessions
      description: |-
        Optional endpoint. Authorization is recommended for all Metrics endpoints, since depending on implementation, use cases, fields required, local laws, and audience it may contain information only city transportation agencies should have access to.

        Metrics data should be viewed as representative sample data, not necessarily a 100% accurate picture of what happens at every defined curb space. Agencies may choose how frequently they update the data; at least monthly is recommended, but weekly, daily, hourly, or more frequent updates are acceptable.

        Agencies wishing to publicly release Metrics data are encouraged to limit releases to static Aggregate data that has been reviewed for potential privacy risks.

        An agency may choose to make this endpoint static (and return all the available data at once in a single file) or dynamic (and allow the use of any or all of the query parameters below to filter the data). If dynamic, all query parameters are optional. If not implemented, a server should reply with 501 Not Implemented.
      responses:
        '200':
          description: CSV file
          content:
            application/vnd.cds+csv;version=1.1:
              schema:
                type: string
                description: CSV rows corresponding to the Session data object.
        '406':
          description: Not Acceptable
        '501':
          description: Not Implemented
      operationId: get-metrics-sessions
      x-stoplight:
        id: ydi58a23alrxl
      parameters:
        - $ref: '#/components/parameters/curb_place_type'
        - $ref: '#/components/parameters/curb_place_id'
        - $ref: '#/components/parameters/min_lat'
        - $ref: '#/components/parameters/min_lng'
        - $ref: '#/components/parameters/max_lat'
        - $ref: '#/components/parameters/max_lng'
        - $ref: '#/components/parameters/lat'
        - $ref: '#/components/parameters/lng'
        - $ref: '#/components/parameters/radius'
        - $ref: '#/components/parameters/start_time'
        - $ref: '#/components/parameters/end_time'
  /metrics/aggregates:
    get:
      summary: Get Metric Aggregates
      tags:
        - aggregates
      description: |-
        Optional endpoint. Authorization is recommended for all Metrics endpoints, since depending on implementation, use cases, fields required, local laws, and audience it may contain information only city transportation agencies should have access to.

        Metrics data should be viewed as representative sample data, not necessarily a 100% accurate picture of what happens at every defined curb space. Agencies may choose how frequently they update the data; at least monthly is recommended, but weekly, daily, hourly, or more frequent updates are acceptable.

        Agencies wishing to publicly release Metrics data are encouraged to limit releases to static Aggregate data that has been reviewed for potential privacy risks.

        An agency may choose to make this endpoint static (and return all the available data at once in a single file) or dynamic (and allow the use of any or all of the query parameters below to filter the data). If dynamic, all query parameters are optional. If not implemented, a server should reply with 501 Not Implemented.
      responses:
        '200':
          description: CSV file
          content:
            application/vnd.cds+csv;version=1.1:
              schema:
                type: string
                description: CSV rows corresponding to the Aggregate data object.
        '406':
          description: Not Acceptable
        '501':
          description: Not Implemented
      operationId: get-metrics-aggregates
      x-stoplight:
        id: g28syxi3c9oac
      parameters:
        - $ref: '#/components/parameters/curb_place_type'
        - $ref: '#/components/parameters/curb_place_id'
        - $ref: '#/components/parameters/metric_type'
        - $ref: '#/components/parameters/min_lat'
        - $ref: '#/components/parameters/min_lng'
        - $ref: '#/components/parameters/max_lat'
        - $ref: '#/components/parameters/max_lng'
        - $ref: '#/components/parameters/lat'
        - $ref: '#/components/parameters/lng'
        - $ref: '#/components/parameters/radius'
        - $ref: '#/components/parameters/start_time'
        - $ref: '#/components/parameters/end_time'
components:
  schemas: {}
  parameters:
    min_lat:
      name: min_lat
      in: query
      required: false
      schema:
        type: number
      description: 'Used to specify a latitude and longitude bounding box. Must be used together with `min_lng`, `max_lat`, and `max_lng`. If specified only return locations that intersect the supplied bounding box. This parameter is incompatible with `lat`, `lng`, and `radius`.'
    min_lng:
      name: min_lng
      in: query
      required: false
      schema:
        type: number
      description: 'Used to specify a latitude and longitude bounding box. Must be used together with `min_lat`, `max_lat`, and `max_lng`. If specified only return locations that intersect the supplied bounding box. This parameter is incompatible with `lat`, `lng`, and `radius`.'
    max_lat:
      name: max_lat
      in: query
      required: false
      schema:
        type: number
      description: 'Used to specify a latitude and longitude bounding box. Must be used together with `min_lat`, `min_lng`, and `max_lng`. If specified only return locations that intersect the supplied bounding box. This parameter is incompatible with `lat`, `lng`, and `radius`.'
    max_lng:
      name: max_lng
      in: query
      required: false
      schema:
        type: number
      description: 'Used to specify a latitude and longitude bounding box. Must be used together with `min_lat`, `min_lng`, and `max_lat`. If specified only return locations that intersect the supplied bounding box. This parameter is incompatible with `lat`, `lng`, and `radius`.'
    lat:
      name: lat
      in: query
      required: false
      schema:
        type: number
      description: 'Specifies a latitude and longitude bounding point and a radius away from that point. Must be used together with `lng` and `radius`. Returns only locations that are within radius centimeters of the point identified by lat/lng. Curb Zones in the response MUST be ordered ascending by distance from the center point. This parameter is incompatible with `min_lat`, `min_lng`, `max_lat`, and `max_lng`.'
    lng:
      name: lng
      in: query
      required: false
      schema:
        type: number
      description: 'Specifies a latitude and longitude bounding point and a radius away from that point. Must be used together with `lat` and `radius`. Returns only locations that are within radius centimeters of the point identified by lat/lng. Curb Zones in the response MUST be ordered ascending by distance from the center point. This parameter is incompatible with `min_lat`, `min_lng`, `max_lat`, and `max_lng`.'
    radius:
      name: radius
      in: query
      required: false
      schema:
        type: number
      description: 'Specifies a latitude and longitude bounding point and a radius away from that point. Must be used together with `lng` and `lng`. Returns only locations that are within radius centimeters of the point identified by lat/lng. Curb Zones in the response MUST be ordered ascending by distance from the center point. This parameter is incompatible with `min_lat`, `min_lng`, `max_lat`, and `max_lng`.'
    start_time:
      name: start_time
      in: query
      required: false
      schema:
        $ref: ../Shared Data Models/timestamp.yaml
      description: The start of the time period to return data; the value is inclusive.
    end_time:
      name: end_time
      in: query
      required: false
      schema:
        $ref: ../Shared Data Models/timestamp.yaml
      description: The end of the time period to return data; the value is exclusive.
    curb_place_type:
      name: curb_place_type
      in: query
      required: false
      schema:
        type: string
        enum:
          - area
          - zone
          - space
          - object
      description: The type of curb place this aggregate applies to from the Curbs API. Required with `curb_place_id`.
    curb_place_id:
      name: curb_place_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: The ID of this single curb place. If specified, only return data contained within this curb place. Required with `curb_place_type`.
    metric_type:
      name: metric_type
      in: query
      required: false
      schema:
        type: string
        enum:
          - total_sessions
          - total_events
          - turnover
          - average_dwell_time
          - occupancy_percent
      description: 'The single metric to return from the [Methodology](https://github.com/openmobilityfoundation/curb-data-specification/tree/main/metrics#methodology).'
