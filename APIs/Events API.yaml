openapi: 3.1.0
x-stoplight:
  id: i4ivj21etaicj
info:
  title: Event API
  version: '1.1'
  description: 'The Events API is a REST API allowing real-time and historic events at the curb to be sent to cities, and the ability to check on the status of any sensors. Events can come from company data feeds, on street sensors, session payments, company check-ins, in-person parking personnel, and/or other city data sources. Data sent in the Events API can be connected to the Curbs API over time and space, and events are used for calculations in the Metrics API.'
  contact:
    name: Open Mobility Foundation
    url: 'https://www.openmobilityfoundation.org'
    email: membership@openmobilityfoundation.org
  license:
    name: Creative Commons Attribution 4.0 International Public License
    url: 'https://creativecommons.org/licenses/by/4.0/'
tags:
  - name: events
    description: Query curb events.
  - name: status
    description: Query curb sensor and source status.
servers:
  - url: 'http://localhost:3000'
paths:
  /events/events:
    get:
      summary: Get Events
      tags:
        - events
      responses:
        '200':
          description: OK
          headers: {}
          content:
            application/json:
              schema:
                type: object
                required:
                  - version
                  - time_zone
                  - last_updated
                  - currency
                  - data
                properties:
                  version:
                    $ref: ../Rest Responses/rest_response_version.yaml
                    x-stoplight:
                      id: qs05jtmqdlff8
                  time_zone:
                    $ref: ../Rest Responses/rest_response_time_zone.yaml
                    x-stoplight:
                      id: bg8ymkjkxr1c0
                  last_updated:
                    $ref: ../Rest Responses/rest_response_last_updated.yaml
                    x-stoplight:
                      id: 5tjorzs6qxy1k
                  currency:
                    $ref: ../Rest Responses/rest_response_currency.yaml
                    x-stoplight:
                      id: ez7o2wgpfn60b
                  custom_attributes_dictionary:
                    $ref: ../Rest Responses/rest_response_custom_attributes_dictionary.yaml
                  author:
                    $ref: ../Rest Responses/rest_response_author.yaml
                    x-stoplight:
                      id: zecy3vq5gihxl
                  license_url:
                    $ref: ../Rest Responses/rest_response_license_url.yaml
                    x-stoplight:
                      id: eq4rb5itzgfc2
                  data:
                    type: object
                    x-stoplight:
                      id: fhxkczml8n5d5
                    required:
                      - events
                    properties:
                      events:
                        type: array
                        x-stoplight:
                          id: wywl1bdwd0h74
                        items:
                          $ref: ../Shared Data Models/curb_event.yaml
                          x-stoplight:
                            id: kien1mkesfu4a
      operationId: get-events-events
      x-stoplight:
        id: er2r1dx6pype6
      parameters:
        - schema:
            type: string
          in: query
          name: event_time
          description: An ISO 8601 extended datetime representing a UTC hour between 00 and 23 in `YYYY-MM-DDTHH` format. If omitted, return all events from the last 60 minutes. For example, `event_time=2019-10-01T07` returns events where `2019-10-01T07:00:00 <= event.event_time < 2019-10-01T08:00:00` UTC.
        - $ref: '#/components/parameters/curb_area_id'
        - $ref: '#/components/parameters/curb_zone_id'
        - $ref: '#/components/parameters/curb_space_id'
        - $ref: '#/components/parameters/curb_object_id'
      security:
        - bearerAuth: []
        - {}
      description: |-
        Authorization is recommended for this endpoint.
        This required endpoint must be implemented by every Events API server. It returns CDS events ordered by `event_time`, with the newest events first, following the Event Times guidance.
  /events/status:
    get:
      summary: Get Status
      tags:
        - status
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - version
                  - time_zone
                  - last_updated
                  - currency
                  - data
                properties:
                  version:
                    $ref: ../Rest Responses/rest_response_version.yaml
                    x-stoplight:
                      id: eqdftemislrw6
                  time_zone:
                    $ref: ../Rest Responses/rest_response_time_zone.yaml
                    x-stoplight:
                      id: m2xew4hnw3xop
                  last_updated:
                    $ref: ../Rest Responses/rest_response_last_updated.yaml
                    x-stoplight:
                      id: ovzkxvgjhbxyn
                  currency:
                    $ref: ../Rest Responses/rest_response_currency.yaml
                    x-stoplight:
                      id: wjynocnlhuxnu
                  author:
                    $ref: ../Rest Responses/rest_response_author.yaml
                    x-stoplight:
                      id: q597ybxvfwozn
                  license_url:
                    $ref: ../Rest Responses/rest_response_license_url.yaml
                    x-stoplight:
                      id: jejwny26g9kbp
                  data:
                    type: object
                    x-stoplight:
                      id: e1wkbj37xvkz9
                    required:
                      - status
                    properties:
                      status:
                        type: array
                        x-stoplight:
                          id: mkzjjnavtjcch
                        items:
                          $ref: ../Shared Data Models/curb_status.yaml
                          x-stoplight:
                            id: 19y5xjcx0b5m5
        '501':
          description: Not Implemented
      operationId: get-events-status
      x-stoplight:
        id: 59cq7582mxcgn
      parameters:
        - $ref: '#/components/parameters/curb_area_id'
        - $ref: '#/components/parameters/curb_zone_id'
        - $ref: '#/components/parameters/curb_space_id'
        - $ref: '#/components/parameters/curb_object_id'
      security:
        - bearerAuth: []
        - {}
      description: |-
        Authorization is recommended for this endpoint.
        Optional endpoint. Enables the querying of statuses for various sensors monitoring curb places. If not implemented, the server should reply with `501 Not Implemented`.
  /events/event:
    post:
      summary: Push Event
      tags:
        - events
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/event_batch_request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event_bulk_response'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event_bulk_response'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event_error_response'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event_error_response'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event_error_response'
        '406':
          description: Not Acceptable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event_error_response'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event_error_response'
        '500':
          description: Internal Server Error. The response may contain a plain-text error message for troubleshooting.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event_error_response'
            text/plain:
              schema:
                type: string
        '501':
          description: Not Implemented
      operationId: post-events-event
      description: |-
        Authorization is required for this endpoint.
        Optional endpoint. Enables submission of CDS events. If not implemented, the server should reply with `501 Not Implemented`. Servers implementing this endpoint should deduplicate events from a publisher based on the `event_id` field, and should expect repeated submissions after interrupted network or system connections.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token authentication. JWT is recommended as the token format.
  schemas:
    event_batch_request:
      type: array
      description: Array of Curb Event objects to submit to `POST /events/event`.
      items:
        $ref: ../Shared Data Models/curb_event.yaml
    event_bulk_failure:
      type: object
      description: Details for one failed item in a bulk event submission response.
      required:
        - item
        - error
        - error_description
      properties:
        item:
          $ref: ../Shared Data Models/curb_event.yaml
          description: The submitted event that failed processing.
        error:
          type: string
          description: Short machine-readable error code for the failed item.
        error_description:
          type: string
          description: Human-readable explanation of why the item failed.
        error_details:
          type: array
          description: Array of field names or other details that explain the failure.
          items:
            type: string
    event_bulk_response:
      type: object
      description: Bulk response for multi-record `POST /events/event` submissions. `success` counts written records, `total` counts submitted records, and `failures` lists item-level errors.
      required:
        - success
        - total
        - failures
      properties:
        success:
          type: integer
          description: Number of successfully written records.
        total:
          type: integer
          description: Total number of records submitted.
        failures:
          type: array
          description: Array of failed records. The array is empty when every item succeeds.
          items:
            $ref: '#/components/schemas/event_bulk_failure'
    event_error_response:
      type: object
      description: Generic Events API error response object. The `error` field is a machine-readable error code, `error_description` is a human-readable explanation, and `error_details` provides additional troubleshooting context.
      required:
        - error
        - error_description
      properties:
        error:
          type: string
          description: Error code such as `bad_param` or `missing_param`.
        error_description:
          type: string
          description: Human-readable error description. This may be localized.
        error_details:
          type: array
          description: Array of error details, such as missing parameters or field names.
          items:
            type: string
  parameters:
    curb_object_id:
      name: curb_object_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: The ID of a Curb Object. If specified, only return events or statuses occurring at this object.
    curb_area_id:
      name: curb_area_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: 'The ID of a Curb Area. If specified, only return events occurring within this area.'
    curb_zone_id:
      name: curb_zone_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: 'The ID of a Curb Zone. If specified, only return events occurring within this zone.'
    curb_space_id:
      name: curb_space_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: 'The ID of a Curb Space. If specified, only return events occurring within this space.'
