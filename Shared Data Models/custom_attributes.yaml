title: Custom Attributes
type: object
description: >
  Implementation-specific custom attributes for this object.
  Publishers MAY use any keys and value structures appropriate to their use case.
  A simple `"key": "value"` structure is provided as an example only and does NOT
  restrict the allowed shapes of `custom_attributes`.
additionalProperties: true
examples:
  - color: "blue"
    kiosk_id: "K-1234"
    internal_tag:
      source: "legacy_system"
      code: 42

