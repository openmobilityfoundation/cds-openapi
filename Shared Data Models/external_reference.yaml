title: External Reference
type: object
description: >
  A reusable structure for linking CDS objects to external systems, specifications,
  or resources such as WZDx, CWZ, MDS, GBFS, GTFS, or public URLs and documents.
properties:
  reference_type:
    type: string
    description: >
      The external system or specification this reference points to
      (for example, "WZDx", "CWZ", "MDS", "GBFS", "GTFS", "website", "document").
  id:
    type: string
    description: Identifier for this object within the external system.
  url:
    type: string
    format: uri
    description: Optional URL for the external resource when available.
  description:
    type: string
    description: Optional human-readable description of this external reference.
required:
  - reference_type
  - id
examples:
  - reference_type: wzdx
    id: "road_event_feature_1234"
    url: "https://example.com/wzdx/features/road_event_feature_1234"
    description: "Linked WZDx road event feature"

